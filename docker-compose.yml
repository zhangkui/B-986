services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3101:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3102:80"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=diaocha
      - DB_USER=diaocha
      - DB_PASS=diaocha
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - upload_data:/var/www/html/uploads
    restart: unless-stopped

  db:
    image: mysql:8.0
    ports:
      - "3103:3306"
    environment:
      - MYSQL_DATABASE=diaocha
      - MYSQL_USER=diaocha
      - MYSQL_PASSWORD=diaocha
      - MYSQL_ROOT_PASSWORD=diaocha_root
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "diaocha", "-pdiaocha"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "3004:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  db_data:
  redis_data:
  upload_data:
